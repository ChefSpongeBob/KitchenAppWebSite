<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="format-detection" content="telephone=no, email=no, address=no" />
		<style>
			html,
			body {
				margin: 0;
				min-height: 100%;
				background: #ffffff;
			}

			body {
				font-family: 'Inter', system-ui, sans-serif;
			}

			.app-shell {
				min-height: 100vh;
				position: relative;
			}

			.boot-splash {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: grid;
				place-items: center;
				background: #ffffff;
				color: #111214;
				overflow: hidden;
				pointer-events: none;
				opacity: 1;
				visibility: visible;
				transition: opacity 0.55s ease, visibility 0.55s ease;
			}

			body.boot-ready .boot-splash {
				opacity: 0;
				visibility: hidden;
			}

			.boot-splash::before,
			.boot-splash::after {
				content: '';
				position: absolute;
				inset: 0;
				pointer-events: none;
			}

			.boot-splash::before {
				display: none;
			}

			.boot-splash::after {
				display: none;
			}

			.boot-inner {
				position: relative;
				display: grid;
				justify-items: center;
				padding: 2rem;
				text-align: center;
			}

			.boot-copy {
				display: grid;
				gap: 0;
				justify-items: center;
			}

			.boot-logo {
				width: min(300px, 74vw);
				height: auto;
				display: block;
				filter: drop-shadow(0 10px 24px rgba(17, 18, 20, 0.1));
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="tap">
		<div class="app-shell">
			<div class="boot-splash" aria-hidden="true">
				<div class="boot-inner">
					<div class="boot-copy">
						<img class="boot-logo" src="/crimini-full-logo.jpg" alt="Crimini" />
					</div>
				</div>
			</div>
			<div style="display: contents">%sveltekit.body%</div>
		</div>
		<script>
			(function () {
				const markReady = () => {
					window.setTimeout(() => {
						document.body.classList.add('boot-ready');
					}, 250);
				};

				if (document.readyState === 'complete') {
					markReady();
				} else {
					window.addEventListener('load', markReady, { once: true });
				}
			})();
		</script>
	</body>
</html>
