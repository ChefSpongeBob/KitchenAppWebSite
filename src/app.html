<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<script>
			window.__bootStartedAt = Date.now();
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="format-detection" content="telephone=no, email=no, address=no" />
		<style>
			html,
			body {
				margin: 0;
				min-height: 100%;
				background: #10141b;
			}

			body {
				font-family: 'Inter', system-ui, sans-serif;
			}

			.app-shell {
				min-height: 100vh;
				position: relative;
			}

			.boot-splash {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: grid;
				place-items: center;
				background:
					radial-gradient(circle at 16% 12%, rgba(132, 146, 166, 0.12), transparent 30%),
					radial-gradient(circle at top, rgba(132, 146, 166, 0.16), transparent 38%),
					radial-gradient(circle at bottom, rgba(148, 163, 184, 0.09), transparent 34%),
					linear-gradient(180deg, #141821, #0f131a);
				background-blend-mode: soft-light, normal, normal, normal;
				color: #f8f1ea;
				overflow: hidden;
				pointer-events: none;
				opacity: 1;
				visibility: visible;
				transition: opacity 0.55s ease, visibility 0.55s ease;
			}

			body.boot-ready .boot-splash {
				opacity: 0;
				visibility: hidden;
			}

			.boot-splash::before,
			.boot-splash::after {
				content: '';
				position: absolute;
				inset: 0;
				pointer-events: none;
			}

			.boot-splash::before {
				background:
					linear-gradient(90deg, transparent 0, rgba(255, 255, 255, 0.025) 50%, transparent 100%);
				transform: translateX(-100%);
				animation: sweep 1.8s ease-in-out infinite;
			}

			.boot-splash::after {
				background:
					repeating-linear-gradient(
						135deg,
						transparent 0 22px,
						rgba(255, 255, 255, 0.015) 22px 23px
					);
				opacity: 0.55;
			}

			.boot-inner {
				position: relative;
				display: grid;
				justify-items: center;
				gap: 0.45rem;
				padding: 2rem;
				text-align: center;
			}

			.boot-copy {
				display: grid;
				gap: 0;
				justify-items: center;
				order: 1;
			}

			.boot-mark {
				position: relative;
				width: min(280px, 72vw);
				display: grid;
				justify-items: center;
				padding-top: 0.6rem;
				order: 2;
			}

			.sandwich-stage {
				position: relative;
				width: min(240px, 66vw);
				height: 168px;
			}

			.sandwich-shadow {
				position: absolute;
				left: 50%;
				bottom: 8px;
				width: 172px;
				height: 22px;
				transform: translateX(-50%);
				border-radius: 999px;
				background: radial-gradient(circle at center, rgba(0, 0, 0, 0.34), transparent 72%);
				filter: blur(7px);
				opacity: 0.68;
			}

			.sandwich-stack {
				position: absolute;
				left: 50%;
				bottom: 24px;
				width: 176px;
				height: 118px;
				transform: translateX(-50%);
				animation: sandwich-bounce 2.3s ease-in-out infinite;
			}

			.ingredient {
				--delay: 0s;
				--final-y: 0px;
				background:
					linear-gradient(180deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.04)),
					var(--ingredient-fill, #ddd);
				position: absolute;
				left: 50%;
				top: 0;
				transform: translate(-50%, -132px);
				opacity: 0;
				box-shadow:
					0 10px 16px rgba(0, 0, 0, 0.18),
					inset 0 1px 0 rgba(255, 255, 255, 0.24);
				animation: ingredient-drop 2.3s cubic-bezier(0.24, 0.85, 0.3, 1) infinite;
				animation-delay: var(--delay);
			}

			.bottom-bun {
				--delay: 0s;
				--final-y: 86px;
				--ingredient-fill: linear-gradient(180deg, #f4c26b 0%, #c8863b 100%);
				width: 170px;
				height: 32px;
				border-radius: 18px 18px 22px 22px;
			}

			.patty {
				--delay: 0.13s;
				--final-y: 68px;
				--ingredient-fill: linear-gradient(180deg, #5b3a2a 0%, #3f271d 100%);
				width: 152px;
				height: 20px;
				border-radius: 14px;
			}

			.cheese {
				--delay: 0.24s;
				--final-y: 55px;
				--ingredient-fill: linear-gradient(180deg, #ffe26a 0%, #f8bc2f 100%);
				width: 160px;
				height: 14px;
				clip-path: polygon(2% 18%, 98% 12%, 88% 100%, 12% 100%);
				border-radius: 8px;
			}

			.lettuce {
				--delay: 0.35s;
				--final-y: 44px;
				--ingredient-fill: linear-gradient(180deg, #7ecf6d 0%, #4f9f49 100%);
				width: 168px;
				height: 16px;
				border-radius: 12px;
			}

			.tomato {
				--delay: 0.46s;
				--final-y: 33px;
				--ingredient-fill: linear-gradient(180deg, #ed5b62 0%, #cf2f3f 100%);
				width: 150px;
				height: 11px;
				border-radius: 9px;
			}

			.onion {
				--delay: 0.57s;
				--final-y: 23px;
				--ingredient-fill:
					linear-gradient(
						90deg,
						rgba(240, 218, 255, 0.78) 0 8%,
						rgba(237, 226, 255, 0.48) 8% 16%,
						rgba(240, 218, 255, 0.78) 16% 24%,
						rgba(237, 226, 255, 0.48) 24% 32%,
						rgba(240, 218, 255, 0.78) 32% 40%,
						rgba(237, 226, 255, 0.48) 40% 48%,
						rgba(240, 218, 255, 0.78) 48% 56%,
						rgba(237, 226, 255, 0.48) 56% 64%,
						rgba(240, 218, 255, 0.78) 64% 72%,
						rgba(237, 226, 255, 0.48) 72% 80%,
						rgba(240, 218, 255, 0.78) 80% 88%,
						rgba(237, 226, 255, 0.48) 88% 100%
					);
				width: 150px;
				height: 10px;
				border-radius: 8px;
			}

			.top-bun {
				--delay: 0.7s;
				--final-y: 0px;
				--ingredient-fill: linear-gradient(180deg, #f7cb7e 0%, #d79349 100%);
				width: 172px;
				height: 42px;
				border-radius: 72px 72px 24px 24px;
			}

			.top-bun::before {
				content: '';
				position: absolute;
				inset: 7px 18px 14px;
				background:
					radial-gradient(circle, rgba(250, 238, 189, 0.9) 0 1.7px, transparent 2px) 0 0 / 22px 12px;
				opacity: 0.86;
			}

			.boot-logo {
				width: min(260px, 72vw);
				height: auto;
				display: block;
				filter:
					brightness(0) saturate(100%) invert(92%) sepia(23%) saturate(189%) hue-rotate(327deg) brightness(109%) contrast(93%)
					drop-shadow(0 10px 24px rgba(0, 0, 0, 0.24));
			}

			.boot-loader {
				width: 140px;
				height: 3px;
				border-radius: 999px;
				background: rgba(255, 255, 255, 0.1);
				overflow: hidden;
				box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
			}

			.boot-loader::after {
				content: '';
				display: block;
				width: 44%;
				height: 100%;
				border-radius: inherit;
				background: linear-gradient(90deg, rgba(148, 163, 184, 0.72), rgba(132, 146, 166, 0.95));
				animation: load-bar 1.1s ease-in-out infinite;
			}

			.boot-status {
				margin: 0.15rem 0 0.1rem;
				color: #f3f7fd;
				font-size: 0.74rem;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				font-weight: 700;
			}

			@keyframes ingredient-drop {
				0%,
				12% {
					transform: translate(-50%, -132px);
					opacity: 0;
				}
				18% {
					opacity: 1;
				}
				34% {
					transform: translate(-50%, calc(var(--final-y) + 9px));
					opacity: 1;
				}
				43%,
				100% {
					transform: translate(-50%, var(--final-y));
					opacity: 1;
				}
			}

			@keyframes sandwich-bounce {
				0%,
				33%,
				100% {
					transform: translateX(-50%) translateY(0);
				}
				38% {
					transform: translateX(-50%) translateY(6px);
				}
				46% {
					transform: translateX(-50%) translateY(-2px);
				}
				53% {
					transform: translateX(-50%) translateY(0);
				}
			}

			@keyframes load-bar {
				0% {
					transform: translateX(-120%);
				}
				100% {
					transform: translateX(320%);
				}
			}

			@keyframes sweep {
				0% {
					transform: translateX(-100%);
				}
				100% {
					transform: translateX(100%);
				}
			}

		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="tap">
		<div class="app-shell">
			<div class="boot-splash" aria-hidden="true">
				<div class="boot-inner">
					<div class="boot-mark">
						<div class="sandwich-stage">
							<div class="sandwich-shadow"></div>
							<div class="sandwich-stack">
								<div class="ingredient bottom-bun"></div>
								<div class="ingredient patty"></div>
								<div class="ingredient cheese"></div>
								<div class="ingredient lettuce"></div>
								<div class="ingredient tomato"></div>
								<div class="ingredient onion"></div>
								<div class="ingredient top-bun"></div>
							</div>
						</div>
					</div>
					<div class="boot-copy">
						<img class="boot-logo" src="/favicon-splash.svg" alt="Kitchen Hub" />
					</div>
					<p class="boot-status">Prepping...</p>
					<div class="boot-loader"></div>
				</div>
			</div>
			<div style="display: contents">%sveltekit.body%</div>
		</div>
		<script>
			(function () {
				const MIN_SPLASH_MS = 1800;
				const markReady = () => {
					const startedAt = window.__bootStartedAt || Date.now();
					const elapsed = Date.now() - startedAt;
					const remaining = Math.max(0, MIN_SPLASH_MS - elapsed);
					window.setTimeout(() => {
						document.body.classList.add('boot-ready');
					}, remaining);
				};

				if (document.readyState === 'complete') {
					markReady();
				} else {
					window.addEventListener('load', markReady, { once: true });
				}
			})();
		</script>
	</body>
</html>
