[platformio]
default_envs = gateway, sensor-node

[env]
platform = espressif32
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
  paulstoffregen/OneWire@^2.3.8
  milesburton/DallasTemperature@^4.0.4

[env:gateway]
build_src_filter = +<gateway.cpp>
build_flags =
  ${env.build_flags}
  -DCRIMINI_FIRMWARE_GATEWAY=1

[env:sensor-node]
build_src_filter = +<sensor_node.cpp>
build_flags =
  ${env.build_flags}
  -DCRIMINI_FIRMWARE_SENSOR_NODE=1
